<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Évolutions du droit - Visualisateur de Codes Juridiques</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>Évolutions du droit</h1>
        <p class="subtitle">Visualisez les modifications des codes juridiques à l'aide des données de <a href="https://git.tricoteuses.fr/codes" target="_blank" rel="noopener"><strong>git.tricoteuses.fr</strong></a> et <a href="https://www.legifrance.gouv.fr/" target="_blank" rel="noopener">Légifrance</a>.</p>
    </header>

    <main>
        <section class="controls">
            <!-- Single row: code selector, dates, mode toggle, article filter, print -->
            <div class="controls-row">
                <div class="code-selector-wrapper">
                    <input type="text" id="code-input" list="code-list" placeholder="Chargement des codes..." disabled autocomplete="off">
                    <datalist id="code-list"></datalist>
                </div>
                <div class="date-control">
                    <label for="date-start">Date de début</label>
                    <input type="date" id="date-start">
                </div>
                <div class="date-control">
                    <label for="date-end">Date de fin</label>
                    <input type="date" id="date-end">
                </div>
                <div class="mode-toggle-container" id="mode-toggle-container">
                    <span class="mode-label">Avant / Après</span>
                    <div class="toggle-switch">
                        <div class="toggle-slider"></div>
                    </div>
                    <span class="mode-label">Liste des modifications</span>
                </div>
                <div class="article-filter-wrapper">
                    <label for="article-filter">Filtrer les articles</label>
                    <input type="text" id="article-filter" placeholder="Tous les articles...">
                </div>
                <button type="button" id="btn-print" class="btn-secondary hidden">
                    Imprimer
                </button>
            </div>
        </section>

        <section id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p>Chargement en cours...</p>
        </section>

        <section id="error" class="error hidden">
            <p id="error-message"></p>
        </section>

        <section id="results" class="results hidden">
            <!-- Print header (visible only when printing) -->
            <div id="print-header" class="print-header"></div>

            <!-- Before/After View -->
            <div id="view-before-after" class="view-before-after">
                <div id="diff-left" class="diff-pane diff-left"></div>
            </div>

            <!-- Changes List View -->
            <div id="view-changes" class="view-changes hidden">
                <div class="changes-container">
                    <div class="commits-list">
                        <h3>Modifications</h3>
                        <ul id="commits-list"></ul>
                    </div>
                    <div class="commit-detail">
                        <div id="commit-header" class="commit-header">
                            <p class="placeholder">Sélectionnez une modification pour voir les détails</p>
                        </div>
                        <div id="commit-diff" class="commit-diff"></div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
